<!DOCTYPE html>
<html>
<head>
    <title>Natalia</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1a1a1a, black);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .box {
            text-align: center;
            transform: translateY(-20px);
        }

        h1 {
            font-size: 42px;
            letter-spacing: 4px;
            margin: 0 0 12px;
        }

        p {
            opacity: 0.75;
            margin: 0 0 25px;
            font-size: 18px;
        }

        a {
            display: inline-block;
            padding: 12px 28px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            border-radius: 2px;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>NATALIA</h1>
        <p>AI Content Creator</p>
        <a href="#">Instagram</a>
    </div>
</body>
</html>
