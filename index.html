<!DOCTYPE html>
<html>
<head>
    <title>Natalia</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #1a1a1a, black);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        .box {
            text-align: center;
        }

        h1 {
            font-size: 60px;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        p {
            opacity: 0.6;
            margin-bottom: 30px;
        }

        a {
            padding: 12px 25px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            background: white;
            color: black;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>NATALIA</h1>
        <p>AI Content Creator</p>
        <a href="#">Instagram</a>
    </div>
</body>
</html>
